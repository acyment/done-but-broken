# Immich pilot dependency stack: Postgres + Redis ONLY.
# Image pins are copied verbatim (tag@digest) from the substrate's own
# docker/docker-compose.dev.yml at the pinned commit 4a8c3b6 — same database
# and cache the upstream dev stack uses. ML service and web are intentionally
# absent (prereg v2 §7.5: ML off, web off).
#
# The Postgres container keeps its stock (UTC) clock on purpose: the birthDate
# column is `date`, so the DB never does timezone math on it — the trap lives
# entirely in the server process (pg driver parses `date` -> local-midnight JS
# Date; toISOString rolls it back a day when the server clock is ahead of UTC).
# Only the SERVER process carries the pinned zone/instant.
name: immich-pilot-deps

services:
  database:
    container_name: immich_pilot_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: immich
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    ports:
      - '127.0.0.1:15433:5432'
    volumes:
      - pilot_pgdata:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U immich -d immich']
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    container_name: immich_pilot_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    ports:
      - '127.0.0.1:16380:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping || exit 1']
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  pilot_pgdata:
